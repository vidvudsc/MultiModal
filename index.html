<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tiny Multimodal</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1014;
      color: #f3f5f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1014;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
    }

    .chat {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      padding: 20px;
      gap: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      color: #aeb5c4;
      font-size: 13px;
    }

    .conversation {
      min-height: 360px;
      overflow: auto;
      border: 1px solid #292d38;
      border-radius: 8px;
      background: #151720;
      padding: 16px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .placeholder {
      color: #7f8798;
    }

    form {
      border: 1px solid #2b3040;
      border-radius: 8px;
      background: #171a23;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .preview {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid #303646;
      border-radius: 6px;
      color: #c6ccd8;
      background: #11141b;
      font-size: 13px;
    }

    .preview.active {
      display: flex;
    }

    .composer {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) 92px;
      gap: 8px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 160px;
      resize: vertical;
      border: 0;
      outline: none;
      border-radius: 6px;
      padding: 12px;
      background: #10131a;
      color: #f3f5f8;
      font: inherit;
      line-height: 1.4;
    }

    input[type="file"] {
      display: none;
    }

    button,
    .icon-button {
      height: 40px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
    }

    .icon-button {
      display: grid;
      place-items: center;
      background: #222838;
      color: #e6eaff;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
    }

    button[type="submit"] {
      background: #6978ff;
      color: white;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    aside {
      border-left: 1px solid #292d38;
      background: #141720;
      padding: 18px;
      overflow: auto;
    }

    aside h2 {
      margin: 0 0 14px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid #2a3040;
      border-radius: 6px;
      padding: 10px;
      background: #10131a;
    }

    .label {
      color: #8c94a5;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .value {
      font-size: 18px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .meta {
      border-top: 1px solid #292d38;
      padding-top: 14px;
      color: #b7bdca;
      font-size: 13px;
      line-height: 1.5;
    }

    .top-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .top-token {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 54px;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #252b39;
      overflow: hidden;
      margin-top: 4px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: #7c8aff;
    }

    @media (max-width: 840px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        border-left: 0;
        border-top: 1px solid #292d38;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="chat">
      <header>
        <h1>Tiny Multimodal</h1>
        <div id="status" class="status">idle</div>
      </header>

      <main id="conversation" class="conversation">
        <span class="placeholder">Upload an image, type a prompt, then generate.</span>
      </main>

      <form id="form">
        <div id="preview" class="preview">
          <span id="fileName"></span>
          <span id="fileSize"></span>
        </div>
        <div class="composer">
          <label class="icon-button" title="Attach image">
            <input id="image" name="image" type="file" accept="image/*" />
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.8-9.8a4.2 4.2 0 0 1 6 6L9.6 18.4a2.5 2.5 0 0 1-3.5-3.5l8.9-8.9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </label>
          <textarea id="prompt" name="prompt">Describe this image.</textarea>
          <button id="submit" type="submit">Send</button>
        </div>
      </form>
    </section>

    <aside>
      <h2>Generation</h2>
      <div class="stat-grid">
        <div class="stat">
          <div class="label">Tokens</div>
          <div id="tokenCount" class="value">0</div>
        </div>
        <div class="stat">
          <div class="label">Avg prob</div>
          <div id="avgProb" class="value">-</div>
        </div>
        <div class="stat">
          <div class="label">Last prob</div>
          <div id="lastProb" class="value">-</div>
        </div>
        <div class="stat">
          <div class="label">Image</div>
          <div id="hasImage" class="value">-</div>
        </div>
      </div>

      <div class="meta">
        <div><strong>Top next-token probabilities</strong></div>
        <div id="topList" class="top-list"></div>
      </div>

      <div id="meta" class="meta"></div>
    </aside>
  </div>

  <script>
    const form = document.getElementById("form");
    const image = document.getElementById("image");
    const preview = document.getElementById("preview");
    const fileName = document.getElementById("fileName");
    const fileSize = document.getElementById("fileSize");
    const conversation = document.getElementById("conversation");
    const submit = document.getElementById("submit");
    const status = document.getElementById("status");
    const tokenCount = document.getElementById("tokenCount");
    const avgProb = document.getElementById("avgProb");
    const lastProb = document.getElementById("lastProb");
    const hasImage = document.getElementById("hasImage");
    const topList = document.getElementById("topList");
    const meta = document.getElementById("meta");

    let tokens = 0;
    let probSum = 0;

    image.addEventListener("change", () => {
      const file = image.files[0];
      if (!file) {
        preview.classList.remove("active");
        return;
      }
      preview.classList.add("active");
      fileName.textContent = file.name;
      fileSize.textContent = `${(file.size / 1024).toFixed(1)} KB`;
    });

    function resetStats() {
      tokens = 0;
      probSum = 0;
      tokenCount.textContent = "0";
      avgProb.textContent = "-";
      lastProb.textContent = "-";
      hasImage.textContent = image.files[0] ? "yes" : "no";
      topList.textContent = "";
      meta.textContent = "";
    }

    function renderTop(top) {
      topList.textContent = "";
      for (const item of top || []) {
        const row = document.createElement("div");
        row.className = "top-token";
        const left = document.createElement("div");
        const label = document.createElement("div");
        label.textContent = item.token || "[blank]";
        const bar = document.createElement("div");
        bar.className = "bar";
        const fill = document.createElement("div");
        fill.className = "fill";
        fill.style.width = `${Math.max(0, Math.min(100, item.prob * 100))}%`;
        bar.appendChild(fill);
        left.appendChild(label);
        left.appendChild(bar);
        const right = document.createElement("div");
        right.textContent = `${(item.prob * 100).toFixed(1)}%`;
        row.appendChild(left);
        row.appendChild(right);
        topList.appendChild(row);
      }
    }

    function handleEvent(event) {
      if (event.type === "meta") {
        hasImage.textContent = event.image ? "yes" : "no";
        meta.textContent = `device: ${event.device}\nmax tokens: ${event.max_new_tokens}\ntemp: ${event.temperature}\ntop_k: ${event.top_k}`;
        return;
      }
      if (event.type === "token") {
        conversation.textContent += event.text;
        tokens += 1;
        probSum += event.prob || 0;
        tokenCount.textContent = String(tokens);
        lastProb.textContent = `${((event.prob || 0) * 100).toFixed(1)}%`;
        avgProb.textContent = `${((probSum / tokens) * 100).toFixed(1)}%`;
        renderTop(event.top);
        conversation.scrollTop = conversation.scrollHeight;
        return;
      }
      if (event.type === "error") {
        conversation.textContent += `\n[error] ${event.message}`;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      resetStats();
      conversation.textContent = "";
      submit.disabled = true;
      status.textContent = "generating";

      const data = new FormData(form);
      try {
        const response = await fetch("/api/generate", { method: "POST", body: data });
        if (!response.ok || !response.body) {
          conversation.textContent = `Request failed: ${response.status}`;
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";
          for (const line of lines) {
            if (!line.trim()) continue;
            handleEvent(JSON.parse(line));
          }
        }
      } catch (error) {
        conversation.textContent = String(error);
      } finally {
        submit.disabled = false;
        status.textContent = "idle";
      }
    });
  </script>
</body>
</html>
